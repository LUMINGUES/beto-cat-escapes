name: Build Android APK + AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
      - run: npm install
      - run: npx cap add android || echo "ja adicionado"
      - name: Configura AdMob no Manifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "com.google.android.gms.ads.APPLICATION_ID" "$MANIFEST"; then
            sed -i '/<\/application>/i\        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-6497152814228418~7528960636"/>' "$MANIFEST"
          fi
      - run: npx cap sync android
      - name: Build Debug APK
        run: cd android && chmod +x ./gradlew && ./gradlew assembleDebug --no-daemon
      - name: Build Release AAB
        run: cd android && ./gradlew bundleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
      - uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
