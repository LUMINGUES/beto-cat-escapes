name: Build Android APK + AAB (assinado)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: android-actions/setup-android@v3
        with:
          packages: platform-tools platforms;android-34 build-tools;34.0.0
      - run: npm install
      - run: npx cap add android || echo "ja adicionado"
      - name: AdMob Manifest
        run: |
          M=android/app/src/main/AndroidManifest.xml
          if ! grep -q APPLICATION_ID "$M"; then
            sed -i "/<\/application>/i\        <meta-data android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\"ca-app-pub-6497152814228418~7528960636\"/>" "$M"
          fi
      - run: npx cap sync android
      - name: Decode keystore
        env:
          KS_B64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KS_B64" ]; then
            echo "Secret SIGNING_KEYSTORE_BASE64 ausente"; exit 1
          fi
          echo "$KS_B64" | base64 -d > android/app/release.keystore
          ls -lh android/app/release.keystore
      - name: Build Debug APK
        run: cd android && chmod +x ./gradlew && ./gradlew assembleDebug --no-daemon
      - name: Build Release AAB ASSINADO
        env:
          STORE_PW: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PW: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
            -Pandroid.injected.signing.store.password="$STORE_PW" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PW"
      - name: Build Release APK ASSINADO
        env:
          STORE_PW: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PW: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
            -Pandroid.injected.signing.store.password="$STORE_PW" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PW"
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
      - uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk
