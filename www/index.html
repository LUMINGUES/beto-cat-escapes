<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!--
═══════════════════════════════════════════════════════════════════════════
  GOOGLE ADSENSE FOR GAMES (H5 GAMES ADS) — INTEGRAÇÃO
═══════════════════════════════════════════════════════════════════════════

  PASSO 1: Crie conta no AdSense em https://adsense.google.com
  PASSO 2: Cadastre seu site/jogo e aguarde a aprovação (~dias)
  PASSO 3: Pegue seu ID de publisher (formato: ca-pub-XXXXXXXXXXXXXXXX)
  PASSO 4: Cole o ID nos DOIS lugares marcados abaixo:
           - na tag <script> data-ad-client (logo abaixo)
           - na constante GOOGLE_AD_CLIENT (no JS no fim do arquivo)

  PASSO 5: Quando publicar PRA VALER, mude:
           data-adbreak-test="on"   →   REMOVA ESSA LINHA
           Test mode mostra anúncios de teste do Google.
═══════════════════════════════════════════════════════════════════════════
-->
<script async
  data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
  data-adbreak-test="on"
  src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"
  crossorigin="anonymous">
</script>
<script>
  // Helpers da API do AdSense for Games
  window.adsbygoogle = window.adsbygoogle || [];
  window.adBreak = (o) => adsbygoogle.push(o);
  window.adConfig = (o) => adsbygoogle.push(o);
</script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Fredoka', system-ui, -apple-system, sans-serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
    color: white;
  }
  #game-canvas {
    display: block;
    width: 100%;
    height: 100%;
    position: fixed;
    inset: 0;
  }

  /* ======= WOLF RED GAMES SPLASH ======= */
  #wolf-splash {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at center, #B71C1C 0%, #5C0000 80%, #1A0000 100%);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    opacity: 0;
    animation: splashIn 0.6s ease-out 0.1s forwards,
               splashOut 0.6s ease-in 2.3s forwards;
  }
  #wolf-splash.done { display: none; }
  @keyframes splashIn { to { opacity: 1; } }
  @keyframes splashOut { to { opacity: 0; visibility: hidden; } }

  .wolf-icon {
    width: clamp(140px, 38vw, 200px);
    height: clamp(140px, 38vw, 200px);
    filter: drop-shadow(0 0 30px rgba(255, 50, 50, 0.6));
    animation: wolfPulse 1.8s ease-in-out infinite;
  }
  @keyframes wolfPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  .splash-title {
    font-family: 'Black Ops One', 'Bungee', sans-serif;
    font-size: clamp(38px, 11vw, 58px);
    letter-spacing: 4px;
    color: white;
    text-shadow:
      0 0 20px rgba(255, 80, 80, 0.8),
      3px 3px 0 #5C0000;
    line-height: 1;
  }
  .splash-sub {
    font-family: 'Bungee', sans-serif;
    font-size: clamp(18px, 5vw, 26px);
    letter-spacing: 12px;
    color: #FFD0D0;
    margin-top: -6px;
    text-indent: 12px;
  }
  .splash-bar {
    width: clamp(100px, 30vw, 160px);
    height: 3px;
    background: linear-gradient(90deg, transparent, #FF5050, transparent);
    margin-top: 8px;
  }

  /* ======= HUD ======= */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 18px;
    padding-top: max(18px, env(safe-area-inset-top));
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    z-index: 5;
  }
  #hud.hidden { display: none; }
  #score-block { display: flex; flex-direction: column; gap: 4px; }
  #score {
    font-family: 'Bungee', 'Fredoka', sans-serif;
    font-size: clamp(34px, 10vw, 52px);
    color: white;
    line-height: 0.9;
    text-shadow:
      3px 3px 0 #1a4d8c,
      -2px -2px 0 #1a4d8c, 2px -2px 0 #1a4d8c, -2px 2px 0 #1a4d8c,
      0 6px 12px rgba(0,0,0,0.4);
  }
  #level-tag {
    font-family: 'Bungee', sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
    color: white;
    background: rgba(0, 0, 0, 0.45);
    padding: 4px 12px;
    border-radius: 999px;
    border: 2px solid white;
    align-self: flex-start;
  }
  #right-hud {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: flex-end;
  }
  #bird-count {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: white;
    background: #FF3E5C;
    padding: 7px 14px;
    border-radius: 999px;
    border: 3px solid white;
    box-shadow: 0 4px 0 #b21f3a, 0 6px 12px rgba(0,0,0,0.3);
    white-space: nowrap;
  }
  #mute-btn {
    pointer-events: auto;
    background: rgba(0,0,0,0.45);
    border: 2px solid white;
    color: white;
    width: 42px; height: 42px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
  }

  /* ======= LEVEL BANNER ======= */
  #level-banner {
    position: fixed;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.7);
    z-index: 8;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
  }
  #level-banner.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  .banner-num {
    font-family: 'Bungee', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    color: white;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
  }
  .banner-name {
    font-family: 'Bungee', sans-serif;
    font-size: clamp(48px, 14vw, 72px);
    color: #FFD700;
    line-height: 1;
    text-shadow:
      4px 4px 0 #1a4d8c,
      -2px -2px 0 #1a4d8c, 2px -2px 0 #1a4d8c, -2px 2px 0 #1a4d8c,
      0 10px 20px rgba(0,0,0,0.5);
  }
  .banner-flag {
    font-size: 56px;
    margin-top: 8px;
  }

  /* ======= OVERLAYS ======= */
  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    padding: 32px;
    z-index: 10;
    background:
      radial-gradient(ellipse at top, rgba(255, 217, 181, 0.5), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(91, 180, 232, 0.78), rgba(91, 180, 232, 0.45));
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-family: 'Bungee', 'Fredoka', sans-serif;
    font-size: clamp(60px, 16vw, 100px);
    color: #FF8C42;
    text-align: center;
    line-height: 0.9;
    letter-spacing: -1px;
    transform: rotate(-3deg);
    text-shadow:
      4px 4px 0 #1a4d8c,
      -1px -1px 0 #1a4d8c, 1px -1px 0 #1a4d8c, -1px 1px 0 #1a4d8c,
      8px 10px 0 rgba(0,0,0,0.18);
  }
  .overlay .subtitle {
    font-size: clamp(15px, 4.2vw, 20px);
    font-weight: 700;
    color: #1a4d8c;
    text-align: center;
    max-width: 320px;
    line-height: 1.35;
  }
  .play-btn {
    font-family: 'Bungee', 'Fredoka', sans-serif;
    font-size: clamp(22px, 6vw, 30px);
    color: white;
    background: #FF3E5C;
    border: 4px solid white;
    padding: 16px 52px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 6px 0 #b21f3a, 0 10px 24px rgba(0,0,0,0.25);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    letter-spacing: 1.5px;
    margin-top: 4px;
  }
  .play-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #b21f3a, 0 4px 10px rgba(0,0,0,0.2);
  }
  .continue-ad-btn {
    font-family: 'Bungee', 'Fredoka', sans-serif;
    font-size: clamp(18px, 5vw, 24px);
    color: white;
    background: linear-gradient(135deg, #4CAF50, #2E7D32);
    border: 4px solid white;
    padding: 14px 38px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 6px 0 #1B5E20, 0 10px 24px rgba(0,0,0,0.25);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    letter-spacing: 1px;
    margin-top: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .continue-ad-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #1B5E20, 0 4px 10px rgba(0,0,0,0.2);
  }
  .continue-ad-btn.hidden { display: none; }
  .continue-ad-btn .ad-tag {
    font-size: 0.5em;
    background: rgba(0,0,0,0.25);
    padding: 2px 8px;
    border-radius: 999px;
    letter-spacing: 1.5px;
    font-weight: 400;
  }
  .controls-hint {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-top: 4px;
    max-width: 320px;
  }
  .controls-hint div {
    background: rgba(255,255,255,0.85);
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
    color: #1a4d8c;
    border: 2px solid white;
    text-align: center;
  }
  .stats {
    display: flex;
    gap: 18px;
    background: white;
    padding: 14px 22px;
    border-radius: 20px;
    border: 4px solid #1a4d8c;
    box-shadow: 0 6px 0 #0f3361;
  }
  .stat-block { text-align: center; min-width: 70px; }
  .stat-label {
    font-size: 12px;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .stat-value {
    font-family: 'Bungee', sans-serif;
    font-size: 30px;
    color: #FF8C42;
    line-height: 1;
    margin-top: 4px;
  }

  /* ======= FLASH FX ======= */
  #flash {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, rgba(255,215,0,0.35), transparent 60%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s ease-out;
    z-index: 4;
  }
  #flash.show { opacity: 1; transition: opacity 0.05s; }
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(() => {
  // ============================================================
  //   🟦 GOOGLE ADSENSE FOR GAMES — AD MANAGER
  // ============================================================
  //
  //   ⚠️  COLE SEU PUBLISHER ID AQUI (e na tag <script> no <head>!)
  //
  // ============================================================
  const GOOGLE_AD_CLIENT = 'ca-pub-XXXXXXXXXXXXXXXX';

  // Mostrar intersticial a cada N mortes (não mostra toda hora pra não irritar)
  const INTERSTITIAL_FREQUENCY = 3;

  let gameOverCount = 0;
  let adsReady = false;
  let rewardedAvailable = false;
  let rewardedShowFn = null;

  // Configuração inicial do SDK — chamada uma vez
  function initAds() {
    try {
      adConfig({
        preloadAdBreaks: 'on',
        sound: 'on',          // o jogo já roda com som
        onReady: () => {
          adsReady = true;
          console.log('[Ads] H5 Games Ads SDK pronto');
        },
      });
    } catch (e) {
      console.warn('[Ads] adConfig falhou (provavelmente AdSense bloqueado):', e);
    }
  }

  // Intersticial entre partidas — chamado pelo restart-btn (via restartGameWithAd).
  // Para evitar duplicar lógica, a chamada efetiva está em restartGameWithAd.

  // Rewarded — solicita disponibilidade. Se aparecer, mostra botão "CONTINUAR"
  function prepareRewarded(onAvailable, onWatched, onDismissed) {
    rewardedAvailable = false;
    rewardedShowFn = null;
    try {
      adBreak({
        type: 'reward',
        name: 'continue_after_death',
        beforeReward: (showAdFn) => {
          // SDK confirmou que tem um anúncio rewarded disponível
          rewardedAvailable = true;
          rewardedShowFn = showAdFn;
          onAvailable && onAvailable();
        },
        adDismissed: () => {
          // Jogador fechou sem ganhar a recompensa
          onDismissed && onDismissed();
        },
        adViewed: () => {
          // Jogador assistiu até o fim — libera a recompensa
          onWatched && onWatched();
        },
        beforeAd: () => {
          stopMusic();
          if (audioCtx) audioCtx.suspend().catch(() => {});
        },
        afterAd: () => {
          if (audioCtx) audioCtx.resume().catch(() => {});
        },
      });
    } catch (e) {
      console.warn('[Ads] rewarded prepare falhou:', e);
    }
  }

  function showRewardedNow() {
    if (rewardedShowFn) {
      try { rewardedShowFn(); } catch (e) { console.warn('[Ads] showAd falhou:', e); }
      rewardedShowFn = null;
    }
  }

  // ============================================================
  // AUDIO SYSTEM
  // ============================================================
  let audioCtx = null;
  let muted = false;
  let musicPlaying = false;
  let musicNextStart = 0;
  let musicTimer = null;
  let masterGain = null;

  function ensureAudio() {
    if (!audioCtx) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = muted ? 0 : 1;
        masterGain.connect(audioCtx.destination);
      } catch (e) { return null; }
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playNote(freq, when, dur, type = 'sine', vol = 0.1, dest = null) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, when);
    gain.gain.linearRampToValueAtTime(vol, when + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, when + dur);
    osc.connect(gain).connect(dest || masterGain);
    osc.start(when);
    osc.stop(when + dur + 0.05);
  }

  function sfxJump() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(300, t);
    osc.frequency.exponentialRampToValueAtTime(700, t + 0.12);
    gain.gain.setValueAtTime(0.18, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.connect(gain).connect(masterGain);
    osc.start(t); osc.stop(t + 0.16);
  }
  function sfxSlide() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const noise = audioCtx.createBufferSource();
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i/data.length);
    noise.buffer = buf;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 600;
    const gain = audioCtx.createGain();
    gain.gain.value = 0.15;
    noise.connect(filter).connect(gain).connect(masterGain);
    noise.start();
  }
  function sfxLane() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    playNote(500, t, 0.07, 'triangle', 0.12);
    playNote(700, t + 0.05, 0.05, 'triangle', 0.1);
  }
  function sfxBird() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    playNote(880, t, 0.08, 'sine', 0.18);
    playNote(1320, t + 0.06, 0.1, 'sine', 0.16);
    playNote(1760, t + 0.13, 0.12, 'sine', 0.14);
  }
  function sfxBark() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    function woof(start) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(220, start);
      osc.frequency.exponentialRampToValueAtTime(90, start + 0.13);
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.32, start + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.18);
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 1500;
      osc.connect(filter).connect(gain).connect(masterGain);
      osc.start(start); osc.stop(start + 0.2);
    }
    woof(t);
    woof(t + 0.22);
  }
  function sfxHit() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(220, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.4);
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc.connect(gain).connect(masterGain);
    osc.start(t); osc.stop(t + 0.5);
  }
  function sfxLevelUp() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.5];
    notes.forEach((f, i) => playNote(f, t + i * 0.08, 0.2, 'triangle', 0.16));
  }

  // Background music - simple loop, melody varies a bit per level
  const MELODIES = [
    // Day - cheerful major
    { notes: [262, 330, 392, 523, 392, 330, 262, 196], bass: 131, type: 'triangle' },
    // Afternoon - mellow
    { notes: [294, 370, 440, 587, 440, 370, 294, 220], bass: 147, type: 'triangle' },
    // Night - minor
    { notes: [262, 311, 392, 466, 392, 311, 262, 196], bass: 131, type: 'sine' },
    // Snow - icy
    { notes: [330, 415, 494, 659, 494, 415, 330, 247], bass: 165, type: 'sine' },
    // Brazil - samba feel
    { notes: [262, 330, 392, 330, 440, 330, 262, 196], bass: 131, type: 'sawtooth' },
    // Japan - pentatonic

  function startMusic() {
    if (!audioCtx || musicPlaying) return;
    musicPlaying = true;
    musicNextStart = audioCtx.currentTime + 0.05;
    scheduleMusic();
  }
  function scheduleMusic() {
    if (!musicPlaying || !audioCtx) return;
    const m = MELODIES[currentMelodyIdx];
    const beat = 0.28;
    for (let i = 0; i < m.notes.length; i++) {
      playNote(m.notes[i], musicNextStart + i * beat, beat * 0.9, m.type, 0.05);
    }
    // Bass: long held tone
    playNote(m.bass, musicNextStart, beat * m.notes.length, 'sawtooth', 0.025);
    playNote(m.bass / 2, musicNextStart, beat * m.notes.length, 'sine', 0.04);
    musicNextStart += beat * m.notes.length;
    musicTimer = setTimeout(scheduleMusic, beat * m.notes.length * 1000 * 0.75);
  }
  function stopMusic() {
    musicPlaying = false;
    if (musicTimer) { clearTimeout(musicTimer); musicTimer = null; }
  }

  function makeSkyTexture(colors) {
    const c = document.createElement('canvas');
    c.width = 2; c.height = 512;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0, 0, 0, 512);
    if (colors.length === 4) {
      g.addColorStop(0, colors[0]);
      g.addColorStop(0.4, colors[1]);
      g.addColorStop(0.8, colors[2]);
      g.addColorStop(1, colors[3]);
    } else {
      colors.forEach((c, i) => g.addColorStop(i / (colors.length - 1), c));
    }
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 2, 512);
    const tex = new THREE.CanvasTexture(c);
    tex.needsUpdate = true;
    return tex;
  }

    const grass = new THREE.Mesh(
      new THREE.PlaneGeometry(40, GROUND_TILE_LEN),
      new THREE.MeshLambertMaterial({ color: activeTheme.ground })
    );
    grass.rotation.x = -Math.PI / 2;
    tile.add(grass);

    const path = new THREE.Mesh(
      new THREE.PlaneGeometry(7, GROUND_TILE_LEN),
      new THREE.MeshLambertMaterial({ color: activeTheme.path })
    );
    path.rotation.x = -Math.PI / 2;
    path.position.y = 0.01;
    tile.add(path);

    // Lane divider lines
    const laneGroup = new THREE.Group();
    for (let lx of [-1, 1]) {
      for (let i = 0; i < 8; i++) {
        const dash = new THREE.Mesh(
          new THREE.PlaneGeometry(0.1, 1.5),
          new THREE.MeshBasicMaterial({ color: 0xFFFFFF })
        );
        dash.rotation.x = -Math.PI / 2;
        dash.position.set(lx, 0.02, -GROUND_TILE_LEN/2 + 1.5 + i * (GROUND_TILE_LEN/8));
        laneGroup.add(dash);
      }
    }
    tile.add(laneGroup);

    const decorations = new THREE.Group();
    tile.add(decorations);

    tile.userData = { grass, path, decorations };
    populateDecorations(tile);
    return tile;
  }

  function populateDecorations(tile) {
    const decor = tile.userData.decorations;
    while (decor.children.length) decor.remove(decor.children[0]);

    for (let side of [-1, 1]) {
      const numDecor = activeTheme.decor === 'pyramid' ? 3 : 5;
      for (let i = 0; i < numDecor; i++) {
        const z = -GROUND_TILE_LEN/2 + 2 + i * (GROUND_TILE_LEN/numDecor) + (Math.random() - 0.5) * 2;
        const x = side * (4 + Math.random() * (activeTheme.decor === 'pyramid' ? 8 : 5));
        const d = createDecor(activeTheme.decor);
        d.position.set(x, 0, z);
        d.rotation.y = Math.random() * Math.PI * 2;
        d.scale.setScalar(0.8 + Math.random() * 0.4);
        decor.add(d);
      }
      // Distant hill
      const hill = new THREE.Mesh(
        new THREE.SphereGeometry(5, 10, 6),
        new THREE.MeshLambertMaterial({ color: new THREE.Color(activeTheme.ground).multiplyScalar(0.8) })
      );
      hill.position.set(side * 16, -3, -GROUND_TILE_LEN/2 + Math.random() * GROUND_TILE_LEN);
      hill.scale.set(1.2, 0.6, 1);
      decor.add(hill);
    }
  }

  function applyThemeToTile(tile) {
    tile.userData.grass.material.color.setHex(activeTheme.ground);
    tile.userData.path.material.color.setHex(activeTheme.path);
    populateDecorations(tile);
  }

  // ============================================================
  // OBSTACLES
  // ============================================================
  function createObstacle(type) {
    let obs;
    if (type === 'low') {
      const group = new THREE.Group();
      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.38, 0.42, 0.85, 12),
        new THREE.MeshLambertMaterial({ color: 0x5A6470 })
      );
      body.position.y = 0.425; group.add(body);
      const lid = new THREE.Mesh(
        new THREE.CylinderGeometry(0.43, 0.43, 0.1, 12),
        new THREE.MeshLambertMaterial({ color: 0x3A434D })
      );
      lid.position.y = 0.88; group.add(lid);
      for (let i = 0; i < 3; i++) {
        const r = new THREE.Mesh(
          new THREE.TorusGeometry(0.4, 0.025, 4, 12),
          new THREE.MeshLambertMaterial({ color: 0x3A434D })
        );
        r.position.y = 0.2 + i * 0.2; r.rotation.x = Math.PI / 2;
        group.add(r);
      }
      obs = group;
      obs.userData = { type, yMin: 0, yMax: 0.95 };
    } else if (type === 'high') {
      const group = new THREE.Group();
      const beamMat = new THREE.MeshLambertMaterial({ color: 0xFF3E5C });
      const beam = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.3, 0.4), beamMat);
      beam.position.y = 1.05; group.add(beam);
      for (let i = -1; i <= 1; i += 0.5) {
        const stripe = new THREE.Mesh(
          new THREE.BoxGeometry(0.15, 0.32, 0.02),
          new THREE.MeshBasicMaterial({ color: 0xFFFFFF })
        );
        stripe.position.set(i * 0.7, 1.05, 0.22);
        group.add(stripe);
      }
      const pillarMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
      for (let s of [-1, 1]) {
        const pillar = new THREE.Mesh(new THREE.BoxGeometry(0.16, 1.2, 0.16), pillarMat);
        pillar.position.set(s * 0.78, 0.6, 0); group.add(pillar);
      }
      obs = group;
      obs.userData = { type, yMin: 0.85, yMax: 1.25 };
    } else {
      const group = new THREE.Group();
      const crate = new THREE.Mesh(
        new THREE.BoxGeometry(1.4, 1.3, 0.85),
        new THREE.MeshLambertMaterial({ color: 0xA86B3B })
      );
      crate.position.y = 0.65; group.add(crate);
      for (let i = 0; i < 3; i++) {
        const plank = new THREE.Mesh(
          new THREE.BoxGeometry(1.42, 0.05, 0.86),
          new THREE.MeshLambertMaterial({ color: 0x6B4423 })
        );
        plank.position.y = 0.2 + i * 0.4; group.add(plank);
      }
      obs = group;
      obs.userData = { type, yMin: 0, yMax: 1.3 };
    }
    return obs;
  }

  // ============================================================
  // SETUP WORLD
  // ============================================================
  const cat = createCat();
  cat.position.set(0, 0, 0);
  scene.add(cat);

  const dog = createDog();
  dog.position.set(0, 0, 4);
  scene.add(dog);

  // Shadow blobs
  const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.28 });
  const catShadow = new THREE.Mesh(new THREE.CircleGeometry(0.5, 14), shadowMat);
  catShadow.rotation.x = -Math.PI / 2; catShadow.position.y = 0.03; scene.add(catShadow);
  const dogShadow = new THREE.Mesh(new THREE.CircleGeometry(0.6, 14), shadowMat);
  dogShadow.rotation.x = -Math.PI / 2; dogShadow.position.y = 0.03; dogShadow.position.z = 4;
  scene.add(dogShadow);

  // Ground tiles
  const groundTiles = [];
  for (let i = 0; i < NUM_GROUND_TILES; i++) {
    const t = createTile();
    t.position.z = -i * GROUND_TILE_LEN + GROUND_TILE_LEN;
    scene.add(t);
    groundTiles.push(t);
  }

  // Stars layer (for night level)
  const stars = new THREE.Group();
  for (let i = 0; i < 80; i++) {
    const star = new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 5, 4),
      new THREE.MeshBasicMaterial({ color: 0xFFFFFF })
    );
    star.position.set(
      (Math.random() - 0.5) * 60,
      8 + Math.random() * 12,
      -30 - Math.random() * 40
    );
    stars.add(star);
  }
  stars.visible = false;
  scene.add(stars);

  // Snow particles (for snow level)
  const snowParticles = new THREE.Group();
  for (let i = 0; i < 60; i++) {
    const flake = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 4, 4),
      new THREE.MeshBasicMaterial({ color: 0xFFFFFF, transparent: true, opacity: 0.85 })
    );
    flake.position.set(
      (Math.random() - 0.5) * 30,
      Math.random() * 12,
      -30 + Math.random() * 40
    );
    flake.userData = { fallSpeed: 1 + Math.random() * 2, drift: (Math.random() - 0.5) * 0.5 };
    snowParticles.add(flake);
  }
  snowParticles.visible = false;
  scene.add(snowParticles);

  // Pools
  const obstacles = [];
  const birds = [];

  // ============================================================
  // GAME STATE
  // ============================================================
  const state = {
    running: false,
    gameOver: false,
    introPlaying: false,
    speed: 9,
    score: 0,
    birds: 0,
    catY: 0,
    catYVel: 0,
    sliding: false,
    slideTimer: 0,
    laneIndex: 1,
    laneTarget: 0,
    nextSpawnZ: -20,
    runTime: 0,
    level: 0,
    nextBarkTime: 5,
  };

  // ============================================================
  // SPAWNING
  // ============================================================
  function spawnRow() {
    const lanesUsed = new Set();
    const numObs = state.runTime > 15 && Math.random() < 0.45 ? 2 : 1;
    for (let i = 0; i < numObs; i++) {
      let lane, attempts = 0;
      do { lane = Math.floor(Math.random() * 3); attempts++; } while (lanesUsed.has(lane) && attempts < 8);
      if (lanesUsed.size >= 2) break;
      lanesUsed.add(lane);
      const types = ['low', 'high', 'full'];
      const type = types[Math.floor(Math.random() * types.length)];
      const obs = createObstacle(type);
      obs.position.x = LANES[lane];
      obs.position.z = state.nextSpawnZ;
      scene.add(obs);
      obstacles.push(obs);
    }
    const freeLanes = [0, 1, 2].filter(l => !lanesUsed.has(l));
    if (freeLanes.length > 0 && Math.random() < 0.68) {
      const lane = freeLanes[Math.floor(Math.random() * freeLanes.length)];
      const count = 3 + Math.floor(Math.random() * 3);
      for (let i = 0; i < count; i++) {
        const b = createBird();
        b.position.set(LANES[lane], 1.0, state.nextSpawnZ - i * 1.4);
        scene.add(b);
        birds.push(b);
      }
    }
  }

  // ============================================================
  // INPUT
  // ============================================================
  function moveLane(dir) {
    if (!state.running) return;
    const prev = state.laneIndex;
    state.laneIndex = Math.max(0, Math.min(2, state.laneIndex + dir));
    if (prev !== state.laneIndex) {
      state.laneTarget = LANES[state.laneIndex];
      sfxLane();
    }
  }
  function doJump() {
    if (!state.running) return;
    if (state.catY < 0.05 && !state.sliding) {
      state.catYVel = JUMP_FORCE;
      sfxJump();
    }
  }
  function doSlide() {
    if (!state.running) return;
    if (state.catY < 0.05 && !state.sliding) {
      state.sliding = true;
      state.slideTimer = SLIDE_DURATION;
      sfxSlide();
    }
  }

  let touchStartX = 0, touchStartY = 0, touchActive = false;
  const canvas = document.getElementById('game-canvas');
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchActive = true;
  }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (!touchActive) return;
    touchActive = false;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const ax = Math.abs(dx), ay = Math.abs(dy);
    if (Math.max(ax, ay) < 25) return;
    if (ax > ay) {
      if (dx > 0) moveLane(1); else moveLane(-1);
    } else {
      if (dy < 0) doJump(); else doSlide();
    }
  }, { passive: true });
  addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (k === 'arrowleft' || k === 'a') moveLane(-1);
    else if (k === 'arrowright' || k === 'd') moveLane(1);
    else if (k === 'arrowup' || k === 'w' || k === ' ') doJump();
    else if (k === 'arrowdown' || k === 's') doSlide();
  });

  // ============================================================
  // COLLISIONS
  // ============================================================
  function checkObstacleHit() {
    const catX = cat.position.x;
    const catBottom = state.catY;
    const catTop = state.catY + (state.sliding ? 0.55 : 1.35);
    for (const obs of obstacles) {
      const dz = obs.position.z;
      if (dz < -0.55 || dz > 0.55) continue;
      if (Math.abs(obs.position.x - catX) > 0.7) continue;
      if (catBottom < obs.userData.yMax - 0.05 && catTop > obs.userData.yMin + 0.05) return obs;
    }
    return null;
  }
  function pickupBird() {
    for (let i = birds.length - 1; i >= 0; i--) {
      const b = birds[i];
      if (Math.abs(b.position.z) < 0.7 && Math.abs(b.position.x - cat.position.x) < 0.7 && Math.abs(b.position.y - (state.catY + 0.6)) < 1.3) {
        state.birds += 1;
        state.score += 25;
        scene.remove(b);
        birds.splice(i, 1);
        sfxBird();
        const flash = document.getElementById('flash');
        flash.classList.add('show');
        setTimeout(() => flash.classList.remove('show'), 120);
      }
    }
  }

  // ============================================================
  // LEVEL SYSTEM
  // ============================================================
  function applyTheme(themeIdx, instant = false) {
    activeTheme = THEMES[themeIdx];
    scene.background = makeSkyTexture(activeTheme.sky);
    scene.fog.color.setHex(activeTheme.fog);
    scene.fog.near = activeTheme.fogDist[0];
    scene.fog.far = activeTheme.fogDist[1];
    sun.color.setHex(activeTheme.sunColor);
    sun.intensity = activeTheme.sun;
    ambient.intensity = activeTheme.ambient;
    stars.visible = !!activeTheme.stars;
    snowParticles.visible = !!activeTheme.snow;
    if (instant) {
      groundTiles.forEach(applyThemeToTile);
    }
    currentMelodyIdx = themeIdx;
    document.getElementById('level-tag').textContent = `LVL ${themeIdx + 1} · ${activeTheme.name}`;
  }

  function showLevelBanner(themeIdx) {
    const banner = document.getElementById('level-banner');
    banner.querySelector('.banner-num').textContent = `LEVEL ${themeIdx + 1}`;
    banner.querySelector('.banner-name').textContent = THEMES[themeIdx].name;
    banner.querySelector('.banner-flag').textContent = THEMES[themeIdx].flag;
    banner.classList.add('show');
    setTimeout(() => banner.classList.remove('show'), 2000);
  }

  function checkLevelUp() {
    const newLevel = Math.min(THEMES.length - 1, Math.floor(state.runTime / LEVEL_DURATION));
    if (newLevel !== state.level) {
      state.level = newLevel;
      applyTheme(newLevel);
      showLevelBanner(newLevel);
      sfxLevelUp();
    }
  }

  // ============================================================
  // ANIMATION LOOP
  // ============================================================
  const clock = new THREE.Clock();
  let animTime = 0;

  function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    animTime += dt;

    if (state.running && !state.gameOver) {
      update(dt);
    } else {
      idleAnimate(dt);
    }
    animateAmbient(dt);
    renderer.render(scene, camera);
  }

  function animateAmbient(dt) {
    // Snow falling
    if (snowParticles.visible) {
      snowParticles.children.forEach(f => {
        f.position.y -= f.userData.fallSpeed * dt;
        f.position.x += f.userData.drift * dt;
        if (f.position.y < 0) {
          f.position.y = 12;
          f.position.x = (Math.random() - 0.5) * 30;
        }
      });
    }
    // Stars twinkle
    if (stars.visible) {
      const t = animTime * 2;
      stars.children.forEach((s, i) => {
        s.scale.setScalar(0.6 + Math.abs(Math.sin(t + i)) * 0.6);
      });
    }
    // Bird wing flapping animation (anywhere)
    birds.forEach(b => {
      const flap = Math.sin(animTime * 18) * 0.6;
      b.userData.leftWing.rotation.z = flap;
      b.userData.rightWing.rotation.z = -flap;
    });
  }

  function idleAnimate(dt) {
    const t = animTime * 6;
    cat.userData.legs.forEach((leg, i) => {
      leg.rotation.x = Math.sin(t + i * Math.PI * 0.8) * 0.15;
    });
    cat.userData.tail.rotation.z = Math.sin(t * 0.7) * 0.15;
    dog.position.y = Math.abs(Math.sin(animTime * 2.5)) * 0.1;
    dog.userData.tail.rotation.z = Math.sin(animTime * 3) * 0.3;
  }

  function update(dt) {
    state.runTime += dt;
    state.speed += dt * 0.18;
    state.score += dt * state.speed * 1.5;

    checkLevelUp();

    const moveZ = state.speed * dt;

    // Ground tiles
    for (const tile of groundTiles) {
      tile.position.z += moveZ;
      if (tile.position.z > GROUND_TILE_LEN) {
        tile.position.z -= GROUND_TILE_LEN * NUM_GROUND_TILES;
        applyThemeToTile(tile); // get current theme decor
      }
    }

    // Obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
      obstacles[i].position.z += moveZ;
      if (obstacles[i].position.z > 6) { scene.remove(obstacles[i]); obstacles.splice(i, 1); }
    }

    // Birds
    for (let i = birds.length - 1; i >= 0; i--) {
      const b = birds[i];
      b.position.z += moveZ;
      b.position.y = 1.0 + Math.sin(animTime * 4 + b.position.z) * 0.18;
      b.rotation.y += dt * 0.5;
      if (b.position.z > 6) { scene.remove(b); birds.splice(i, 1); }
    }

    // Spawning
    state.nextSpawnZ += moveZ;
    if (state.nextSpawnZ > -22) {
      spawnRow();
      const gap = 5.5 + Math.random() * 3.5 - Math.min(2, state.runTime * 0.05);
      state.nextSpawnZ -= Math.max(3.5, gap);
    }

    // Cat lane interpolation
    const dx = state.laneTarget - cat.position.x;
    cat.position.x += dx * Math.min(1, dt * LANE_SPEED);
    cat.rotation.z = -dx * 0.18;

    // Cat jumping
    if (state.catY > 0 || state.catYVel > 0) {
      state.catYVel += GRAVITY * dt;
      state.catY += state.catYVel * dt;
      if (state.catY < 0) { state.catY = 0; state.catYVel = 0; }
    }
    cat.position.y = state.catY;

    // Slide visual
    if (state.sliding) {
      state.slideTimer -= dt;
      cat.userData.model.scale.y = 0.45;
      cat.userData.model.rotation.x = -0.6 + Math.PI; // wait, model already rotated PI
      // Adjust: model rotation already has Math.PI on Y. Use scale only.
      cat.userData.model.rotation.x = -0.6;
      if (state.slideTimer <= 0) {
        state.sliding = false;
        cat.userData.model.scale.y = 1;
        cat.userData.model.rotation.x = 0;
      }
    } else {
      cat.userData.model.scale.y += (1 - cat.userData.model.scale.y) * Math.min(1, dt * 15);
      cat.userData.model.rotation.x += (0 - cat.userData.model.rotation.x) * Math.min(1, dt * 15);
    }

    // Cat running animation
    const runT = animTime * Math.max(12, state.speed * 1.6);
    cat.userData.legs.forEach((leg, i) => {
      leg.rotation.x = Math.sin(runT + i * Math.PI) * 0.85;
    });
    cat.userData.tail.rotation.z = Math.sin(runT * 0.6) * 0.35;
    cat.position.y = state.catY + (state.sliding ? 0 : Math.abs(Math.sin(runT)) * 0.06);

    // Dog animation
    dog.position.x = cat.position.x * 0.35;
    dog.position.z = 4 + Math.sin(animTime * 1.2) * 0.4;
    dog.position.y = Math.abs(Math.sin(runT * 0.95)) * 0.18;
    dog.userData.legs.forEach((leg, i) => {
      leg.rotation.x = Math.sin(runT * 1.0 + i * Math.PI) * 1.0;
    });
    dog.userData.tail.rotation.z = Math.sin(animTime * 8) * 0.4;
    dog.userData.tongue.rotation.x = Math.sin(animTime * 10) * 0.25;

    // Random barks during play
    if (state.runTime > state.nextBarkTime) {
      sfxBark();
      state.nextBarkTime = state.runTime + 7 + Math.random() * 6;
    }

    // Shadows
    catShadow.position.x = cat.position.x;
    catShadow.scale.setScalar(Math.max(0.4, 1 - state.catY * 0.18));
    dogShadow.position.x = dog.position.x;
    dogShadow.position.z = dog.position.z;
    dogShadow.scale.setScalar(Math.max(0.7, 1 - dog.position.y * 0.3));

    // Collisions
    const hit = checkObstacleHit();
    if (hit) { triggerGameOver(); return; }
    pickupBird();

    // HUD
    document.getElementById('score').textContent = Math.floor(state.score);
    document.getElementById('bird-count').textContent = `🐦 ${state.birds}`;
  }

  // ============================================================
  // GAME OVER
  // ============================================================
  function triggerGameOver() {
    state.gameOver = true;
    state.running = false;
    sfxHit();
    setTimeout(sfxBark, 200);
    stopMusic();

    const lungeStart = dog.position.z;
    const t0 = animTime;
    function lunge() {
      const t = (animTime - t0) / 0.7;
      if (t >= 1) {
        document.getElementById('final-score').textContent = Math.floor(state.score);
        document.getElementById('final-birds').textContent = state.birds;
        document.getElementById('final-level').textContent = state.level + 1;
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('game-over').classList.remove('hidden');

        // ===== ANÚNCIOS =====
        // Esconde botão de continuar (vai aparecer SE tiver rewarded disponível)
        const continueBtn = document.getElementById('continue-ad-btn');
        continueBtn.classList.add('hidden');

        // Só oferece o "Continuar (ver anúncio)" UMA VEZ por partida
        if (!continueUsedThisRun) {
          prepareRewarded(
            // onAvailable — Google confirmou que há rewarded pronto
            () => { continueBtn.classList.remove('hidden'); },
            // onWatched — jogador viu o anúncio inteiro → continuar!
            () => { continueUsedThisRun = true; grantContinue(); },
            // onDismissed — jogador fechou antes do fim
            () => { continueBtn.classList.add('hidden'); }
          );
        }
        return;
      }
      dog.position.z = lungeStart + (1.0 - lungeStart) * t;
      requestAnimationFrame(lunge);
    }
    lunge();
  }

  // Após assistir rewarded — devolve o jogador ao jogo com folga de obstáculos
  function grantContinue() {
    // Esconde overlay e botão
    document.getElementById('game-over').classList.add('hidden');
    document.getElementById('continue-ad-btn').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');

    // Limpa obstáculos perto do gato pra dar margem
    for (let i = obstacles.length - 1; i >= 0; i--) {
      if (obstacles[i].position.z > -10) {
        scene.remove(obstacles[i]);
        obstacles.splice(i, 1);
      }
    }

    // Empurra o cachorro pra trás pra dar tempo de reagir
    dog.position.set(0, 0, 6);

    // Reseta estado do gato pra pista do meio
    state.laneIndex = 1;
    state.laneTarget = 0;
    state.catY = 0;
    state.catYVel = 0;
    state.sliding = false;
    state.gameOver = false;
    state.running = true;

    startMusic();
  }

  // ============================================================
  // START / RESTART
  // ============================================================
  let continueUsedThisRun = false;

  function startGame() {
    ensureAudio();
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-over').classList.add('hidden');
    document.getElementById('continue-ad-btn').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');

    continueUsedThisRun = false;

    state.running = true; state.gameOver = false;
    state.speed = 9; state.score = 0; state.birds = 0;
    state.catY = 0; state.catYVel = 0;
    state.sliding = false; state.slideTimer = 0;
    state.laneIndex = 1; state.laneTarget = 0;
    state.nextSpawnZ = -22; state.runTime = 0;
    state.level = 0; state.nextBarkTime = 4;

    cat.position.set(0, 0, 0);
    cat.userData.model.scale.y = 1;
    cat.userData.model.rotation.x = 0;
    cat.rotation.set(0, 0, 0);
    dog.position.set(0, 0, 4);

    obstacles.forEach(o => scene.remove(o)); obstacles.length = 0;
    birds.forEach(b => scene.remove(b)); birds.length = 0;

    applyTheme(0, true);
    spawnRow();
    state.nextSpawnZ -= 6;
    spawnRow();

    showLevelBanner(0);
    startMusic();
  }

  // Wrapper de restart: tenta mostrar intersticial a cada N mortes ANTES do restart
  function restartGameWithAd() {
    // O SDK do AdSense for Games sabe quando deve realmente exibir.
    // beforeAd/afterAd cuidam de pausar/retomar áudio. Depois disso, start.
    let started = false;
    const start = () => {
      if (started) return;
      started = true;
      startGame();
    };

    // Tenta o intersticial. Se rolar, beforeAd/afterAd disparam; start vai pro
    // adBreakDone. Se NÃO rolar (filtrado pelo SDK), também cai no adBreakDone.
    gameOverCount++;
    if (gameOverCount % INTERSTITIAL_FREQUENCY === 0) {
      try {
        adBreak({
          type: 'next',
          name: 'between_runs',
          beforeAd: () => { stopMusic(); if (audioCtx) audioCtx.suspend().catch(() => {}); },
          afterAd:  () => { if (audioCtx) audioCtx.resume().catch(() => {}); },
          adBreakDone: () => start(),
        });
        // fallback de segurança se o SDK não responder em 3s
        setTimeout(start, 3000);
      } catch (e) {
        start();
      }
    } else {
      start();
    }
  }

  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('restart-btn').addEventListener('click', restartGameWithAd);
  document.getElementById('start-btn').addEventListener('touchend', e => { e.preventDefault(); startGame(); });
  document.getElementById('restart-btn').addEventListener('touchend', e => { e.preventDefault(); restartGameWithAd(); });
  document.getElementById('continue-ad-btn').addEventListener('click', showRewardedNow);
  document.getElementById('continue-ad-btn').addEventListener('touchend', e => { e.preventDefault(); showRewardedNow(); });
  document.getElementById('mute-btn').addEventListener('click', () => { ensureAudio(); toggleMute(); });

  // Inicializa o SDK do AdSense for Games (faz uma vez no carregamento)
  initAds();

  // ============================================================
  // RESIZE
  // ============================================================
  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // ============================================================
  // INTRO ANIMATION (cat fleeing from dog, cinematic camera)
  // ============================================================
  function playIntroAnimation() {
    state.introPlaying = true;
    // Set characters apart so the dog "chases"
    cat.position.set(0, 0, 0);
    dog.position.set(0, 0, 4.5);

    // Camera starts to the SIDE so we see the chase scene from profile
    const startTime = animTime;
    const introDuration = 2.5;

    function step() {
      const t = Math.min(1, (animTime - startTime) / introDuration);
      const ease = 1 - Math.pow(1 - t, 3); // ease-out

      // Camera path: start at side, swoop to behind
      const startPos = { x: 9, y: 4, z: 5 };
      const endPos = { x: 0, y: 7, z: 10 };
      camera.position.set(
        startPos.x + (endPos.x - startPos.x) * ease,
        startPos.y + (endPos.y - startPos.y) * ease,
        startPos.z + (endPos.z - startPos.z) * ease
      );
      const lookStart = { x: 0, y: 1, z: 2 };
      const lookEnd = { x: 0, y: 1, z: -3 };
      camera.lookAt(
        lookStart.x + (lookEnd.x - lookStart.x) * ease,
        lookStart.y + (lookEnd.y - lookStart.y) * ease,
        lookStart.z + (lookEnd.z - lookStart.z) * ease
      );

      // Animate running (legs going)
      const runT = animTime * 16;
      cat.userData.legs.forEach((leg, i) => {
        leg.rotation.x = Math.sin(runT + i * Math.PI) * 0.85;
      });
      dog.userData.legs.forEach((leg, i) => {
        leg.rotation.x = Math.sin(runT + i * Math.PI) * 1.0;
      });
      cat.userData.tail.rotation.z = Math.sin(runT * 0.6) * 0.35;
      dog.userData.tail.rotation.z = Math.sin(animTime * 8) * 0.4;
      cat.position.y = Math.abs(Math.sin(runT)) * 0.08;
      dog.position.y = Math.abs(Math.sin(runT * 0.95)) * 0.18;

      // One bark mid-intro
      if (t > 0.4 && t < 0.43 && !state.introPlaying.barked) {
        sfxBark();
        state.introPlaying.barked = true;
      }

      if (t < 1) {
        requestAnimationFrame(step);
      } else {
        state.introPlaying = false;
        camera.position.set(0, 7, 10);
        camera.lookAt(0, 1, -3);
        document.getElementById('start-screen').classList.remove('hidden');
      }
    }
    step();
  }

  // ============================================================
  // BOOT SEQUENCE
  // ============================================================
  animate(); // start render loop immediately

  // Wolf Red Games splash plays via CSS animation. After 3s, hide & start intro.
  setTimeout(() => {
    document.getElementById('wolf-splash').classList.add('done');
    playIntroAnimation();
  }, 3000);

})();
</script>
